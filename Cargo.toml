[package]
name = "silt"
version = "0.1.0"
edition = "2024"
description = "A minimal, statically-typed, expression-based language with CSP concurrency"

[[bin]]
name = "silt"
path = "src/main.rs"

[lib]
name = "silt"
path = "src/lib.rs"

[dependencies]
lsp-server = "0.7"
lsp-types = "0.97"
regex = "1"
rustyline = "15"
serde_json = "1"
