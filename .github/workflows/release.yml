name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../silt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz silt
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../silt-${{ github.ref_name }}-${{ matrix.target }}.zip silt.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: silt-${{ matrix.target }}
          path: silt-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # Generate a single SHA256SUMS file covering every archive. install.sh
      # and `silt update` both fetch this alongside the binary and refuse to
      # install when the hash doesn't match — the first line of defence
      # against a corrupted or swapped release asset.
      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum silt-${{ github.ref_name }}-*.tar.gz silt-${{ github.ref_name }}-*.zip \
            > silt-${{ github.ref_name }}-SHA256SUMS
          cat silt-${{ github.ref_name }}-SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
