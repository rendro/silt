name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-features

      - name: cargo check --benches
        run: cargo check --benches --all-features

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

  test-os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features

  fuzz-corpus:
    name: Fuzz corpus replay
    runs-on: ubuntu-latest
    # Deterministic regression gate: replays every committed file
    # under fuzz/corpus/<target>/ through each fuzz target exactly
    # once, with NO mutation. Catches regressions on bugs we have
    # previously found without blocking merges on stochastic new
    # discoveries. Discovery-mode fuzzing lives in fuzz-nightly.yml
    # and `fuzz/local.sh`; see fuzz/README.md for the workflow.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus
        run: ./fuzz/seed.sh

      - name: Replay fuzz_lexer corpus
        run: ./fuzz/replay.sh fuzz_lexer

      - name: Replay fuzz_parser corpus
        run: ./fuzz/replay.sh fuzz_parser

      - name: Replay fuzz_formatter corpus
        run: ./fuzz/replay.sh fuzz_formatter

      - name: Replay fuzz_roundtrip corpus
        run: ./fuzz/replay.sh fuzz_roundtrip

      - name: Upload reproducers on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-reproducers
          path: |
            fuzz/artifacts/**
            fuzz/crash-*
            fuzz/leak-*
            fuzz/timeout-*
            fuzz/oom-*
          retention-days: 14
          if-no-files-found: ignore
