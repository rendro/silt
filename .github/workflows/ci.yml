name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-features

      - name: cargo check --benches
        run: cargo check --benches --all-features

      # Hard wall-clock cap on cargo test. The silt runtime has a
      # known intermittent "deadlock detector false-positive" in
      # `test_channel_receive_blocks_scheduled_task` (tests/integration.rs)
      # that, when it fires, panics the test and leaves the integration
      # test binary's shared scheduler state poisoned, hanging every
      # subsequent test. Without a wall-clock bound the GitHub Actions
      # 6h hard ceiling fires instead and we get no diagnostic output.
      # 20 minutes is ~10x the healthy local runtime; if the suite
      # exceeds it, surface a clear failure with logs intact.
      #
      # `perl -e 'alarm; exec'` is portable: works on every GitHub
      # runner image (Linux, macOS) without needing coreutils. macOS
      # ships no `timeout` binary by default; this avoids the brew
      # install detour.
      - name: cargo test
        run: |
          perl -e 'alarm 1200; exec @ARGV or die "exec: $!"' cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

  test-os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      # Force LF line endings on Windows so the formatter parity
      # check (`every_example_is_canonical_formatted`) does not
      # trip on CRLF-rewritten example files.
      - name: Configure git for LF on Windows
        if: runner.os == 'Windows'
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      # See `check.cargo test` for rationale on the wall-clock bound.
      # macOS uses the same perl alarm trick as Linux. Windows lacks a
      # `perl` binary but ships PowerShell; use Start-Process+
      # WaitForExit for the same semantics.
      - name: cargo test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          perl -e 'alarm 1200; exec @ARGV or die "exec: $!"' cargo test --all-features

      - name: cargo test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "cargo" -ArgumentList "test","--all-features" -NoNewWindow -PassThru
          $finished = $process.WaitForExit(20*60*1000)
          if (-not $finished) {
            $process.Kill()
            Write-Error "cargo test exceeded 20-minute wall-clock cap"
            exit 124
          }
          exit $process.ExitCode

  fuzz-corpus:
    name: Fuzz corpus replay
    runs-on: ubuntu-latest
    # Deterministic regression gate: replays every committed file
    # under fuzz/corpus/<target>/ through each fuzz target exactly
    # once, with NO mutation. Catches regressions on bugs we have
    # previously found without blocking merges on stochastic new
    # discoveries. Discovery-mode fuzzing lives in fuzz-nightly.yml
    # and `fuzz/local.sh`; see fuzz/README.md for the workflow.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus
        run: ./fuzz/seed.sh

      - name: Replay fuzz_lexer corpus
        run: ./fuzz/replay.sh fuzz_lexer

      - name: Replay fuzz_parser corpus
        run: ./fuzz/replay.sh fuzz_parser

      - name: Replay fuzz_formatter corpus
        run: ./fuzz/replay.sh fuzz_formatter

      - name: Replay fuzz_roundtrip corpus
        run: ./fuzz/replay.sh fuzz_roundtrip

      - name: Upload reproducers on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-reproducers
          path: |
            fuzz/artifacts/**
            fuzz/crash-*
            fuzz/leak-*
            fuzz/timeout-*
            fuzz/oom-*
          retention-days: 14
          if-no-files-found: ignore
