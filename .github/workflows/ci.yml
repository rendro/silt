name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-features

      - name: cargo check --benches
        run: cargo check --benches --all-features

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --all-features --out xml --output-dir coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  test-os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features

  fuzz-smoke:
    name: Fuzz Smoke (libfuzzer, 30s per target)
    runs-on: ubuntu-latest
    # Non-blocking: fuzz crashes should not fail unrelated PRs until the
    # corpus stabilises. Remove continue-on-error once the corpus is seeded.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz lexer (30s)
        run: cargo +nightly fuzz run fuzz_lexer -- -max_total_time=30
        working-directory: .

      - name: Fuzz parser (30s)
        run: cargo +nightly fuzz run fuzz_parser -- -max_total_time=30
        working-directory: .

      - name: Fuzz formatter (30s)
        run: cargo +nightly fuzz run fuzz_formatter -- -max_total_time=30
        working-directory: .

      - name: Fuzz roundtrip (30s)
        run: cargo +nightly fuzz run fuzz_roundtrip -- -max_total_time=30
        working-directory: .
