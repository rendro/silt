name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-features

      - name: cargo check --benches
        run: cargo check --benches --all-features

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --all-features --out xml --output-dir coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  test-os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features

  fuzz:
    name: Fuzz (libfuzzer, 60s per target)
    runs-on: ubuntu-latest
    # Non-blocking: fuzz regressions are surfaced as CI warnings but do
    # not fail unrelated PRs. Remove once the formatter-idempotency
    # finding (known crash at fuzz/corpus/fuzz_formatter/crash-round29-*)
    # is resolved.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus
        run: ./fuzz/seed.sh

      - name: Fuzz lexer (60s)
        run: cargo +nightly fuzz run fuzz_lexer -- -max_total_time=60

      - name: Fuzz parser (60s)
        run: cargo +nightly fuzz run fuzz_parser -- -max_total_time=60

      - name: Fuzz formatter (60s)
        run: cargo +nightly fuzz run fuzz_formatter -- -max_total_time=60

      - name: Fuzz roundtrip (60s)
        run: cargo +nightly fuzz run fuzz_roundtrip -- -max_total_time=60

      - name: Upload reproducers on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-reproducers
          path: |
            fuzz/artifacts/**
            fuzz/crash-*
            fuzz/leak-*
            fuzz/timeout-*
            fuzz/oom-*
          retention-days: 14
          if-no-files-found: ignore
