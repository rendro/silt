name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-features

      - name: cargo check --benches
        run: cargo check --benches --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

  test-linux:
    # Split Linux test runs across 3 parallel matrix partitions so total
    # wall-clock approximates max(slowest partition) instead of the sum.
    # Partitions are hand-curated for balance:
    #   * heavy   : integration.rs (~180s) + integration_concurrency
    #   * concurrency : scheduler / channel / concurrency_stress / docs_stdlib walker
    #   * rest    : everything else (lib unit tests + 180+ small binaries)
    # Adding a new test file → defaults to the `rest` partition. Move it
    # into the `heavy` or `concurrency` list only when its wall-clock
    # justifies the partition split.
    name: Test Linux (${{ matrix.partition }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        partition: [heavy, concurrency, rest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Different test sets pull different code paths into the
          # binaries — avoid the partitions stomping each other's caches.
          shared-key: test-${{ matrix.partition }}

      # cargo-nextest runs test binaries in PARALLEL (cargo test serializes them).
      # On the `rest` partition with 215 binaries, this is the difference between
      # 16-min wall clock (cargo test) and ~3-min wall clock (nextest).
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo nextest (${{ matrix.partition }})
        run: |
          CI=1 perl -e 'alarm 1500; exec @ARGV or die "exec: $!"' \
            bash .github/scripts/run-test-partition.sh ${{ matrix.partition }}

  test-macos:
    name: Test macOS
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-os-macos
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: cargo nextest
        run: |
          CI=1 perl -e 'alarm 1500; exec @ARGV or die "exec: $!"' cargo nextest run --all-features

  # Windows runners are 3-5× slower than Linux/macOS at file I/O and
  # process spawning, so a single-job sweep of 3800+ tests pushes past
  # the 25-min cap. Partition the same way Linux does so total wall-
  # clock is max(slowest partition) ~10 min instead of >25 min.
  test-windows:
    name: Test Windows (${{ matrix.partition }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        partition: [heavy, concurrency, rest]
    steps:
      - name: Configure git for LF on Windows
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-windows-${{ matrix.partition }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo nextest (${{ matrix.partition }})
        shell: pwsh
        run: |
          $env:CI = "1"
          $process = Start-Process -FilePath "bash" `
            -ArgumentList ".github/scripts/run-test-partition.sh","${{ matrix.partition }}" `
            -NoNewWindow -PassThru
          $finished = $process.WaitForExit(25*60*1000)
          if (-not $finished) {
            $process.Kill()
            Write-Error "cargo nextest exceeded 25-minute wall-clock cap"
            exit 124
          }
          exit $process.ExitCode

  fuzz-corpus:
    name: Fuzz corpus replay
    runs-on: ubuntu-latest
    # Deterministic regression gate: replays every committed file
    # under fuzz/corpus/<target>/ through each fuzz target exactly
    # once, with NO mutation. Catches regressions on bugs we have
    # previously found without blocking merges on stochastic new
    # discoveries. Discovery-mode fuzzing lives in fuzz-nightly.yml
    # and `fuzz/local.sh`; see fuzz/README.md for the workflow.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus
        run: ./fuzz/seed.sh

      - name: Replay fuzz_lexer corpus
        run: ./fuzz/replay.sh fuzz_lexer

      - name: Replay fuzz_parser corpus
        run: ./fuzz/replay.sh fuzz_parser

      - name: Replay fuzz_formatter corpus
        run: ./fuzz/replay.sh fuzz_formatter

      - name: Replay fuzz_roundtrip corpus
        run: ./fuzz/replay.sh fuzz_roundtrip

      - name: Upload reproducers on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-reproducers
          path: |
            fuzz/artifacts/**
            fuzz/crash-*
            fuzz/leak-*
            fuzz/timeout-*
            fuzz/oom-*
          retention-days: 14
          if-no-files-found: ignore
