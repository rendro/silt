; Application Configuration File
; Last updated: 2026-04-02

[server]
host = localhost
port = 8080
max_connections = 100

[database]
; Database connection settings
driver = postgres
host = db.example.com
port = 5432
name = myapp_production
user = admin

[logging]
level = info
file = /var/log/myapp.log
; Set to true for JSON structured logging
format = json

[cache]
enabled = true
ttl = 3600

; This section is intentionally missing "provider" key
[email]
from = noreply@example.com
